name: Publish Package and Deploy Site

on:
  release:
    types: [published]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    concurrency:
      group: npm-publish-${{ github.event.release.tag_name }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify package version
        working-directory: lib
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: node -e 'const { version } = require("./package.json"); if (`v${version}` !== process.env.RELEASE_TAG) throw new Error(`Release tag ${process.env.RELEASE_TAG} must equal v${version}`);'

      - name: Build package
        run: pnpm --filter nest-graph-inspector run build

      - name: Publish package
        working-directory: lib
        run: npm publish

  build:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate static site
        run: pnpm exec nuxt generate
        working-directory: site
        env:
          NITRO_PRESET: github_pages
          NUXT_APP_BASE_URL: /nest-graph-inspector/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/.output/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
